<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

</head>
<body>
    <div class="container">
        <header>
            <h1>📸 Bon Categorizer</h1>
            <p>Scan en categoriseer je bonnetjes automatisch</p>
        </header>

        <main>
            <div class="upload-section">
                <div class="upload-area" id="dropZone">
                    <div class="upload-icon">📁</div>
                    <p>Klik om bonnetje te uploaden</p>
                    <p class="small">of sleep bestand hierheen</p>
                    <input type="file" id="fileInput" accept="image/*" capture="environment">
                </div>
            </div>

            <div class="processing" id="processing" style="display: none;">
                <div class="spinner"></div>
                <p>Bon wordt verwerkt...</p>
            </div>

            <div class="results" id="results" style="display: none;">
                <h2>Herkende Tekst</h2>
                <div class="recognized-text" id="recognizedText"></div>

                <h2>Gecategoriseerde Items</h2>
                <div class="categories" id="categories"></div>

                <div class="actions">
                    <button class="btn primary" id="exportBtn">💾 Exporteer naar CSV</button>
                    <button class="btn secondary" id="newScanBtn">🔄 Nieuwe Scan</button>
                </div>
            </div>
        </main>

        <footer>
            <p>© 2024 Bon Categorizer - Werkt op elke device</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
